<!DOCTYPE html>
<html lang="es">

<head>
    <script>
        // --- STABLE UPDATE ENGINE v68.Y (JSON Based) ---
        (function () {
            const CURRENT_VERSION = '71.6.STRATEGIC';

            // 1. Check version.json (Bypass Cache)
            fetch('version.json?t=' + Date.now())
                .then(res => res.json())
                .then(data => {
                    const localVer = localStorage.getItem('cc_app_version');

                    // Force refresh if version mismatch
                    if (data.version !== localVer) {
                        console.log('🚀 New Version Detected:', data.version);
                        showUpdateToast(data.version);
                    }
                })
                .catch(err => console.log('Version Check Skipped in Offline Mode'));

            function showUpdateToast(newVer) {
                // UI for forced update
                const toast = document.createElement('div');
                toast.id = 'update-toast';
                toast.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#212121; color:white; padding:15px 20px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.5); z-index:10000; display:flex; align-items:center; gap:15px; font-family:sans-serif; min-width:300px;';

                toast.innerHTML = `
                    <div style="flex:1">
                        <div style="font-weight:bold; font-size:1.1rem; margin-bottom:4px;">¡Actualización Lista! 🎉</div>
                        <div style="font-size:0.9rem; opacity:0.8;">Versión ${newVer} disponible.</div>
                    </div>
                    <button id="update-btn" style="background:#00E676; color:#000; border:none; padding:8px 16px; border-radius:8px; font-weight:bold; cursor:pointer;">ACTUALIZAR</button>
                `;

                document.body.appendChild(toast);

                document.getElementById('update-btn').onclick = async () => {
                    toast.innerHTML = 'Limpiando sistema... Espere por favor 🧹';

                    // Critical: Update local storage so we don't prompt again for this version
                    localStorage.setItem('cc_app_version', newVer);

                    try {
                        // 1. Unregister all service workers, waiting for them all to finish
                        if ('serviceWorker' in navigator) {
                            const regs = await navigator.serviceWorker.getRegistrations();
                            for (let r of regs) {
                                await r.unregister();
                            }
                        }

                        // 2. Delete all caches completely, waiting for all to finish
                        if ('caches' in window) {
                            const names = await caches.keys();
                            for (let name of names) {
                                await caches.delete(name);
                            }
                        }
                    } catch (e) {
                        console.error("Error during cleanup:", e);
                    }

                    // 3. Force navigate with Cache-Busting parameter to defeat GitHub Pages CDN
                    // 3. Force navigate with Cache-Busting parameter
                    const finalUrl = window.location.pathname + '?v=' + newVer + '&t=' + Date.now();
                    window.location.href = finalUrl;
                };
            }
        })();

        // --- NUCLEAR CLEANER: Kill old Zombies ---
        window.nuclearReset = async function () {
            console.log('☢️ Running Nuclear Reset...');
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (let r of regs) await r.unregister();
            }
            if ('caches' in window) {
                const names = await caches.keys();
                for (let n of names) await caches.delete(n);
            }
            localStorage.removeItem('cc_app_version');

            // Bypass fetch cache
            const finalUrl = window.location.pathname.replace(/\/$/, '') + '?reset=' + Date.now();
            window.location.replace(finalUrl);
        };
    </script>

<body class="no-auth">
    <div id="app">
        <aside class="sidebar" style="display: none;">
            <div class="brand">
                <img src="assets/logo.png" alt="ClarityCash" style="width:40px; height:40px; border-radius:10px;">
                <h1>ClarityCash</h1>
            </div>
            <nav>
                <button class="nav-item active" data-view="dashboard"><i
                        data-feather="pie-chart"></i><span>Inicio</span></button>
                <button class="nav-item" data-view="transactions"><i
                        data-feather="list"></i><span>Historial</span></button>
                <button class="nav-item" data-view="insights"><i data-feather="zap"></i><span>Análisis</span></button>
                <button class="nav-item" data-view="strategy"><i
                        data-feather="bar-chart-2"></i><span>Auditoría</span></button>
                <button class="nav-item" data-view="goals"><i data-feather="target"></i><span>Metas</span></button>
                <button class="nav-item" data-view="settings">
                    <i data-feather="settings"></i>
                    <span>Centro Financiero</span>
                </button>
            </nav>
            <div class="user-profile">
                <div class="avatar">YO</div>
                <div class="info"><span class="name">Mi Espacio</span><span class="status">Modo Seguro 🛡️</span></div>
            </div>
            <div style="padding: 1rem; border-top: 1px solid #eee; text-align: center;">
                <button onclick="window.nuclearReset()" class="btn"
                    style="width: 100%; background: var(--bg-body); color: var(--danger-color); border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px;">
                    <i data-feather="refresh-cw" style="width: 14px; height: 14px;"></i> Forzar Actualización
                </button>
            </div>
        </aside>

        <div class="sidebar-overlay" style="display: none;"
            onclick="document.querySelector('.sidebar').classList.remove('open'); this.classList.remove('active');">
        </div>

        <main class="main-content">
            <header class="top-bar">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <button class="hamburger-btn"
                        onclick="document.querySelector('.sidebar').classList.toggle('open'); document.querySelector('.sidebar-overlay').classList.toggle('active');"><i
                            data-feather="menu"></i></button>
                    <h2 id="page-title">Resumen Financiero</h2>
                </div>
                <div class="actions" style="display: none; gap: 0.5rem;">
                    <button id="add-transaction-btn" class="btn btn-primary"><i data-feather="plus"></i> <span>Nuevo
                            Gasto</span></button>
                </div>
            </header>
            <div id="content-area" class="content-container">
                <div class="empty-state">
                    <h3>Cargando tu información financiera...</h3>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals (Restored complete structure) -->
    <div id="transaction-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Registrar Movimiento</h3>
                <button type="button" id="scan-btn" class="btn-text"
                    style="background: #E3F2FD; color: #1565C0; padding: 0.4rem 0.8rem; border-radius: 8px; display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 0.85rem; margin-left: auto; margin-right: 10px;">
                    <i data-feather="camera" style="width: 16px; height: 16px;"></i> Escanear
                </button>
                <button class="close-modal"><i data-feather="x"></i></button>
            </div>
            <input type="file" id="receipt-upload" accept="image/*,.heic" style="display: none;">
            <div id="scan-loading"
                style="display:none; text-align:center; padding:15px; background:#E3F2FD; color:#1565C0; margin-top:5px; margin-bottom:15px; border-radius:8px; font-size:0.9rem;">
                <i data-feather="loader" class="spin"></i> Analizando recibo...
            </div>
            <form id="transaction-form">
                <div class="form-group type-selector" style="flex-wrap: wrap;">
                    <label><input type="radio" name="type" value="GASTO" checked
                            onchange="window.ui.populateSelects(this.value)"><span
                            class="badge expense">Gasto</span></label>
                    <label><input type="radio" name="type" value="INGRESO"
                            onchange="window.ui.populateSelects(this.value)"><span
                            class="badge income">Ingreso</span></label>
                    <label><input type="radio" name="type" value="AHORRO"
                            onchange="window.ui.populateSelects(this.value)"><span
                            class="badge savings">Ahorro</span></label>
                    <label><input type="radio" name="type" value="INVERSION"
                            onchange="window.ui.populateSelects(this.value)"><span
                            class="badge investment">Inversión</span></label>
                    <label><input type="radio" name="type" value="PAGO_DEUDA"
                            onchange="window.ui.populateSelects(this.value)"><span class="badge debt"
                            style="background:#FF5722; color:white;">Pago Deuda</span></label>
                </div>
                <!-- Other fields: amount, date, category, account, note -->
                <div class="form-group">
                    <label>Monto</label>
                    <input type="number" name="amount" placeholder="0" required Step="0.01">
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Fecha</label><input type="date" name="date" required></div>
                    <div id="category-group" class="form-group"><label>Categoría</label><select
                            name="category_id"></select></div>
                </div>
                <div class="form-group">
                    <label id="account-label">Cuenta</label>
                    <select name="account_id" required></select>
                </div>
                <div class="form-group"><label>Nota</label><textarea name="note" rows="2"></textarea></div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-text close-modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
